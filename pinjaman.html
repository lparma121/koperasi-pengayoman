<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinjaman - Koperasi Pengayoman</title>
    <style>
        /* CSS Sama seperti sebelumnya dengan aksen Oranye */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1a252f; text-align: center; }
        .sidebar-header h2 { font-size: 1.2rem; color: #1abc9c; }
        .menu { list-style: none; padding: 20px 0; }
        .menu li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.3s; }
        .menu li a:hover, .menu li a.active { background-color: #1abc9c; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { background-color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { padding: 20px; overflow-y: auto; }
        .form-container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; }
        .form-container h3 { margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #e67e22; padding-bottom: 10px; display: inline-block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #e67e22; }
        input[readonly] { background-color: #f1f2f6; cursor: not-allowed; }
        .input-rupiah { display: flex; align-items: center; }
        .input-rupiah span { background-color: #ecf0f1; padding: 12px; border: 1px solid #ccc; border-right: none; border-radius: 4px 0 0 4px; font-weight: bold; color: #7f8c8d; }
        .input-rupiah input { border-radius: 0 4px 4px 0; flex: 1; }
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background-color: #e67e22; }
        .btn-save:hover { background-color: #d35400; }
        .btn-cancel { background-color: #95a5a6; text-decoration: none; display: inline-block; text-align: center;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html">Beranda (Dashboard)</a></li>
            <li><a href="daftar-anggota.html">Data Anggota</a></li>
            <li><a href="simpanan.html">Simpanan</a></li>
            <li><a href="#" class="active" style="background-color: #e67e22;">Pinjaman</a></li>
            <li><a href="angsuran.html">Angsuran</a></li>
	    <a href="laporan.html">Laporan</a>
        </ul>
    </div>

    <div class="main-content">
        <div class="header"><h2>Pengajuan Pinjaman</h2></div>
        <div class="content">
            <div class="form-container">
                <h3>Formulir Pinjaman Anggota</h3>
                <form id="formPinjaman">
                    <div class="form-group">
                        <label for="tanggal">Tanggal Pengajuan</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label for="anggota">Nama Anggota Pemohon</label>
                        <select id="anggota" required>
                            <option value="">-- Sedang memuat data anggota... --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="jumlah">Plafon (Jumlah Pinjaman)</label>
                        <div class="input-rupiah">
                            <span>Rp</span>
                            <input type="number" id="jumlah" placeholder="Contoh: 5000000" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="tenor">Jangka Waktu (Tenor)</label>
                        <input type="text" id="tenor" value="10 Bulan" readonly>
                    </div>
                    <div class="form-group">
                        <label for="keterangan">Tujuan Pinjaman</label>
                        <textarea id="keterangan" rows="3" placeholder="Contoh: Renovasi rumah"></textarea>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-save">Ajukan Pinjaman</button>
                        <a href="index.html" class="btn btn-cancel">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // GANTI DENGAN KODE FIREBASE CONFIG ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb",
	    measurementId: "G-CVWCXTF3FX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Muat Dropdown Anggota
        async function muatDropdownAnggota() {
            const dropdown = document.getElementById('anggota');
            try {
                const querySnapshot = await getDocs(query(collection(db, "anggota"), orderBy("nama", "asc")));
                dropdown.innerHTML = '<option value="">-- Pilih Anggota --</option>';
                querySnapshot.forEach((doc) => {
                    dropdown.innerHTML += `<option value="${doc.id}">${doc.data().no_anggota} - ${doc.data().nama}</option>`;
                });
            } catch (error) {
                dropdown.innerHTML = '<option value="">-- Gagal memuat data --</option>';
            }
        }
        muatDropdownAnggota();

        // Simpan Data Pinjaman
        document.getElementById('formPinjaman').addEventListener('submit', async function(event) {
            event.preventDefault();
            const dropdown = document.getElementById('anggota');
            const dataPinjaman = {
                tanggal: document.getElementById('tanggal').value,
                id_anggota: dropdown.value,
                info_anggota: dropdown.options[dropdown.selectedIndex].text,
                jumlah: parseInt(document.getElementById('jumlah').value),
                tenor: "10 Bulan",
                keterangan: document.getElementById('keterangan').value,
                waktu_input: new Date(),
                status: "Aktif" // Otomatis status aktif saat baru diajukan
            };

            try {
                await addDoc(collection(db, "pinjaman"), dataPinjaman);
                alert("Berhasil! Pinjaman sebesar Rp " + dataPinjaman.jumlah + " telah dicatat.");
                document.getElementById('formPinjaman').reset();
            } catch (e) {
                alert("Gagal menyimpan data pinjaman.");
            }
        });
    </script>
</body>
</html>
