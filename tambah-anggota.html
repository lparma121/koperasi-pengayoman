<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Anggota - Koperasi Pengayoman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1abc9c; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --success: #27ae60; --blue: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--light); }
        
        .sidebar { width: 260px; background-color: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; background-color: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header h2 { color: var(--primary); font-size: 1.1rem; letter-spacing: 1px; }
        .menu { list-style: none; padding: 20px 0; flex: 1; }
        .menu li a { color: #bdc3c7; text-decoration: none; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; }
        .menu li a i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li a:hover, .menu li a.active { background-color: #34495e; color: white; border-left: 4px solid var(--primary); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; overflow-y: auto; }

        .btn-back { background: #95a5a6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: #7f8c8d; }

        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; border-top: 4px solid var(--primary); }
        .form-card h3 { margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-submit { background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background-color: #16a085; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="daftar-anggota.html" class="active"><i class="fa fa-users"></i> Data Anggota</a></li>
            <li><a href="simpanan.html"><i class="fa fa-wallet"></i> Simpanan</a></li>
            <li><a href="setor-massal.html"><i class="fa fa-layer-group"></i> Setor Massal</a></li>
            <li><a href="pinjaman.html"><i class="fa fa-hand-holding-dollar"></i> Pinjaman</a></li>
            <li><a href="angsuran.html"><i class="fa fa-money-bill-wave"></i> Angsuran</a></li>
            <li><a href="laporan.html"><i class="fa fa-file-invoice-dollar"></i> Laporan & SHU</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 style="color: var(--dark)"><i class="fa fa-user-plus"></i> Registrasi Anggota Baru</h2>
            <a href="daftar-anggota.html" class="btn-back"><i class="fa fa-arrow-left"></i> Kembali</a>
        </div>

        <div class="content">
            <div class="form-card">
                <h3>Form Data Anggota Koperasi</h3>
                <form id="formTambahAnggota">
                    <div class="form-group">
                        <label>Nomor Anggota / NIK / NIP</label>
                        <input type="text" id="no_anggota" placeholder="Contoh: 101 / NIP Pegawai" required>
                    </div>

                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                    </div>

                    <div class="form-group">
                        <label>Tanggal Bergabung</label>
                        <input type="date" id="tanggal_gabung" required>
                    </div>

                    <div class="form-group">
                        <label>Status Keanggotaan</label>
                        <select id="status">
                            <option value="Aktif">Aktif</option>
                            <option value="Nonaktif">Nonaktif</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit" id="btnSimpan"><i class="fa fa-save"></i> SIMPAN DATA ANGGOTA</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Set otomatis tanggal gabung hari ini
        document.getElementById('tanggal_gabung').valueAsDate = new Date();

        // Cek Login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        // Simpan Data
        document.getElementById('formTambahAnggota').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Menyimpan...';

            try {
                await addDoc(collection(db, "anggota"), {
                    no_anggota: document.getElementById('no_anggota').value,
                    nama: document.getElementById('nama').value,
                    tanggal_gabung: document.getElementById('tanggal_gabung').value,
                    status: document.getElementById('status').value,
                    waktu_input: new Date().toISOString()
                });

                alert("Anggota berhasil ditambahkan!");
                window.location.href = "daftar-anggota.html"; // Balik ke daftar setelah sukses
            } catch (err) {
                alert("Gagal menambahkan anggota: " + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-save"></i> SIMPAN DATA ANGGOTA';
            }
        });
    </script>
</body>
</html>
