<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Pinjaman - Koperasi Pengayoman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1abc9c; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --success: #27ae60; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--light); }
        .sidebar { width: 260px; background-color: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; background-color: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header h2 { color: var(--primary); font-size: 1.1rem; }
        .menu { list-style: none; padding: 20px 0; flex: 1; }
        .menu li a { color: #bdc3c7; text-decoration: none; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; }
        .menu li a i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li a:hover, .menu li a.active { background-color: #34495e; color: white; border-left-color: var(--primary); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; overflow-y: auto; }
        .btn-new { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .status-aktif { background: #e8f8f5; color: var(--success); }
        .status-lunas { background: #ebf5fb; color: #3498db; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="daftar-anggota.html"><i class="fa fa-users"></i> Data Anggota</a></li>
            <li><a href="simpanan.html"><i class="fa fa-wallet"></i> Simpanan</a></li>
            <li><a href="pinjaman.html" class="active"><i class="fa fa-hand-holding-dollar"></i> Pinjaman</a></li>
            <li><a href="angsuran.html"><i class="fa fa-money-bill-wave"></i> Angsuran</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Monitoring Pinjaman</h2>
            <a href="input-pinjaman.html" class="btn-new"><i class="fa fa-plus"></i> Pinjaman / Top Up Baru</a>
        </div>
        <div class="content">
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Anggota</th>
                            <th>Tgl Pinjam</th>
                            <th>Plafon</th>
                            <th>Sisa Saldo</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="listPinjaman">
                        <tr><td colspan="5" style="text-align:center;">Menyinkronkan data saldo...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const formatR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        async function muatData() {
            const [sPin, sAns] = await Promise.all([
                getDocs(collection(db, "pinjaman")),
                getDocs(collection(db, "angsuran"))
            ]);

            const rekapBayar = {};
            sAns.forEach(doc => {
                const d = doc.data();
                rekapBayar[d.id_pinjaman] = (rekapBayar[d.id_pinjaman] || 0) + (Number(d.jumlah) || 0);
            });

            const tbody = document.getElementById('listPinjaman');
            tbody.innerHTML = '';
            sPin.forEach(doc => {
                const p = doc.data();
                const bayar = rekapBayar[doc.id] || 0;
                const sisa = p.jumlah - bayar;
                const status = sisa <= 0 ? 'LUNAS' : (p.status || 'AKTIF');

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${p.info_anggota}</strong></td>
                        <td>${p.tanggal}</td>
                        <td>${formatR(p.jumlah)}</td>
                        <td style="color:${sisa > 0 ? 'red' : 'green'}; font-weight:bold;">${formatR(sisa)}</td>
                        <td><span class="status-badge ${sisa <= 0 ? 'status-lunas' : 'status-aktif'}">${status}</span></td>
                    </tr>
                `;
            });
        }
        muatData();
    </script>
</body>
</html>
