<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Koperasi Pengayoman</title>
    <style>
        /* Pengaturan Dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; }

        /* Kotak Login */
        .login-container {
            background-color: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center;
        }
        .login-container h2 { color: #1abc9c; margin-bottom: 10px; font-size: 1.6rem; letter-spacing: 1px; }
        .login-container p { color: #7f8c8d; margin-bottom: 35px; font-size: 0.95rem; }

        /* Grup Input Form */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: bold; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        .input-group input:focus { outline: none; border-color: #1abc9c; }

        /* Tombol Masuk Email */
        .btn-login {
            width: 100%; padding: 14px; background-color: #1abc9c; color: white;
            border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; font-weight: bold; margin-top: 15px;
        }
        .btn-login:hover { background-color: #16a085; transform: translateY(-2px); }
        
        .loading-text { font-size: 0.9rem; color: #1abc9c; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>KOPERASI PENGAYOMAN</h2>
        <p>Silakan masuk ke portal admin koperasi</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Email Pengurus</label>
                <input type="email" id="username" placeholder="Masukkan email terdaftar" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan kata sandi" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login" id="btnSubmit">Masuk ke Sistem</button>
            <div id="loadingMsg" class="loading-text">Memverifikasi kredensial...</div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb",
            measurementId: "G-CVWCXTF3FX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const loginForm = document.getElementById('loginForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const loadingMsg = document.getElementById('loadingMsg');

        // LOGIKA LOGIN EMAIL & PASSWORD
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Ubah tampilan tombol saat proses loading
            btnSubmit.style.display = 'none';
            loadingMsg.style.display = 'block';
            
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Redirect ke SPA Master File (index.html)
                    window.location.href = "index.html"; 
                })
                .catch((error) => {
                    console.error("Error Code:", error.code);
                    
                    // Kembalikan tampilan tombol
                    btnSubmit.style.display = 'block';
                    loadingMsg.style.display = 'none';
                    
                    // Pesan error ramah pengguna
                    let pesanError = "Gagal Masuk. Terjadi kesalahan sistem.";
                    if(error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        pesanError = "Email atau Kata Sandi Anda salah!";
                    } else if(error.code === 'auth/network-request-failed') {
                        pesanError = "Gagal terhubung ke server. Periksa internet Anda.";
                    }
                    
                    alert(pesanError);
                });
        });
    </script>

</body>
</html>
