<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pusat Import Data - Koperasi Pengayoman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; padding: 20px; }
        .import-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .tab-selector { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: #1abc9c; color: white; }
        .format-info { background: #fdf6e3; padding: 15px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; border-left: 4px solid #f39c12; }
        .file-input { width: 100%; padding: 20px; border: 2px dashed #1abc9c; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .btn-upload { background: #1abc9c; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        #status { margin-top: 20px; font-weight: bold; text-align: center; }
        .progress-bar { height: 12px; background: #eee; border-radius: 6px; margin-top: 15px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; background: #1abc9c; width: 0%; transition: 0.2s; }
    </style>
</head>
<body>

    <div class="import-box">
        <h2>Pusat Import Data Massal</h2>
        
        <div class="tab-selector">
            <button class="tab-btn active" onclick="setMode('anggota')">Data Anggota</button>
            <button class="tab-btn" onclick="setMode('simpanan')">Saldo Simpanan</button>
            <button class="tab-btn" onclick="setMode('pinjaman')">Data Pinjaman</button>
        </div>

        <div class="format-info" id="formatInfo">
            <strong>Format Kolom CSV Anggota:</strong><br>
            no_anggota, nama, tanggal_gabung
        </div>

        <input type="file" id="csvFile" class="file-input" accept=".csv">
        <button id="btnProses" class="btn-upload">Mulai Import ke Firebase</button>

        <div class="progress-bar" id="progressCont"><div class="progress-fill" id="progressFill"></div></div>
        <div id="status"></div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #1abc9c; text-decoration: none; font-weight: bold;">← Kembali ke Dashboard</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentMode = 'anggota';

        // Fungsi Ganti Tab
        window.setMode = function(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const info = document.getElementById('formatInfo');
            if(mode === 'anggota') info.innerHTML = "<strong>Format Kolom CSV Anggota:</strong><br>no_anggota, nama, tanggal_gabung";
            if(mode === 'simpanan') info.innerHTML = "<strong>Format Kolom CSV Simpanan:</strong><br>no_anggota, jenis_simpanan, jumlah, tanggal_transaksi";
            if(mode === 'pinjaman') info.innerHTML = "<strong>Format Kolom CSV Pinjaman:</strong><br>no_anggota, jumlah, keterangan, tanggal, status";
        }

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });

        document.getElementById('btnProses').addEventListener('click', function() {
            const fileInput = document.getElementById('csvFile');
            if (fileInput.files.length === 0) return alert("Pilih file CSV!");

            const reader = new FileReader();
            reader.onload = async function(e) {
                const rows = e.target.result.split("\n").slice(1);
                document.getElementById('progressCont').style.display = 'block';
                let sukses = 0;

                for (let i = 0; i < rows.length; i++) {
                    const col = rows[i].split(",").map(c => c.trim());
                    if (col.length < 2) continue;

                    try {
                        // Cari ID Dokumen Anggota berdasarkan no_anggota
                        const q = query(collection(db, "anggota"), where("no_anggota", "==", col[0]));
                        const snap = await getDocs(q);
                        
                        if (!snap.empty) {
                            const idAnggota = snap.docs[0].id;
                            const namaAnggota = snap.docs[0].data().nama;
                            const infoAnggota = `${col[0]} - ${namaAsli}`;

                            if (currentMode === 'simpanan') {
                                await addDoc(collection(db, "simpanan"), {
                                    id_anggota: idAnggota,
                                    info_anggota: `${col[0]} - ${namaAnggota}`,
                                    jenis_simpanan: col[1],
                                    jumlah: Number(col[2]),
                                    tanggal_transaksi: col[3],
                                    waktu_input: new Date().toISOString()
                                });
                            } else if (currentMode === 'pinjaman') {
                                await addDoc(collection(db, "pinjaman"), {
                                    id_anggota: idAnggota,
                                    info_anggota: `${col[0]} - ${namaAnggota}`,
                                    jumlah: Number(col[1]),
                                    keterangan: col[2],
                                    tanggal: col[3],
                                    status: col[4] || "Aktif",
                                    waktu_input: new Date().toISOString()
                                });
                            } else {
                                // Import Anggota Biasa
                                await addDoc(collection(db, "anggota"), {
                                    no_anggota: col[0],
                                    nama: col[1],
                                    tanggal_gabung: col[2],
                                    waktu_input: new Date().toISOString()
                                });
                            }
                            sukses++;
                        }
                    } catch (err) { console.error(err); }
                    
                    document.getElementById('progressFill').style.width = Math.round(((i+1)/rows.length)*100) + "%";
                }
                document.getElementById('status').innerText = sukses + " data " + currentMode + " berhasil diimport!";
            };
            reader.readAsText(fileInput.files[0]);
        });
    </script>
</body>
</html>
