<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan SHU - Koperasi Pengayoman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1abc9c; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --success: #27ae60; --orange: #e67e22; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--light); }
        .sidebar { width: 260px; background-color: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; background-color: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header h2 { color: var(--primary); font-size: 1.1rem; }
        .menu { list-style: none; padding: 20px 0; flex: 1; }
        .menu li a { color: #bdc3c7; text-decoration: none; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; }
        .menu li a i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li a:hover, .menu li a.active { background-color: #34495e; color: white; border-left: 4px solid var(--primary); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .content { padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .txt-right { text-align: right; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="daftar-anggota.html"><i class="fa fa-users"></i> Data Anggota</a></li>
            <li><a href="simpanan.html"><i class="fa fa-wallet"></i> Simpanan</a></li>
            <li><a href="setor-massal.html"><i class="fa fa-layer-group"></i> Setor Massal</a></li>
            <li><a href="pinjaman.html"><i class="fa fa-hand-holding-dollar"></i> Pinjaman</a></li>
            <li><a href="angsuran.html"><i class="fa fa-money-bill-wave"></i> Angsuran</a></li>
            <li><a href="laporan.html" class="active"><i class="fa fa-file-invoice-dollar"></i> Laporan & SHU</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header"><h2>Laporan & Simulasi SHU</h2></div>
        <div class="content">
            <div class="card">
                <h3>Pembagian SHU Berdasarkan Kontribusi Jasa</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:15px;">
                    <div class="form-group">
                        <label>Total Laba Jasa (Terkumpul di Sistem)</label>
                        <input type="text" id="labaTersedia" readonly style="background:#f8f9fa; color:var(--success); font-weight:bold;">
                    </div>
                    <div class="form-group">
                        <label>Porsi yang Ingin Dibagikan (%)</label>
                        <input type="number" id="porsiSHU" value="100" min="1" max="100">
                    </div>
                </div>
                <button id="btnHitungSHU" style="margin-top:20px; width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">
                    <i class="fa fa-calculator"></i> HITUNG PEMBAGIAN SHU
                </button>
            </div>

            <div id="hasilSHU" style="display:none;" class="card">
                <table id="tabelSHU">
                    <thead>
                        <tr>
                            <th>Nama Anggota</th>
                            <th class="txt-right">Total Jasa Dibayar</th>
                            <th class="txt-right">Porsi (%)</th>
                            <th class="txt-right">SHU Diterima</th>
                        </tr>
                    </thead>
                    <tbody id="bodySHU"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const formatR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        let totalLabaSistem = 0;
        let dataPerAnggota = {};

        async function muatData() {
            const snap = await getDocs(collection(db, "angsuran"));
            totalLabaSistem = 0;
            dataPerAnggota = {};
            
            snap.forEach(doc => {
                const d = doc.data();
                const bunga = Number(d.bunga) || 0;
                const nama = d.info_anggota || "Tanpa Nama";
                
                totalLabaSistem += bunga;
                dataPerAnggota[nama] = (dataPerAnggota[nama] || 0) + bunga;
            });
            
            document.getElementById('labaTersedia').value = formatR(totalLabaSistem);
        }

        document.getElementById('btnHitungSHU').addEventListener('click', () => {
            const porsiPersen = document.getElementById('porsiSHU').value / 100;
            const labaYangDibagi = totalLabaSistem * porsiPersen;
            const tbody = document.getElementById('bodySHU');
            
            tbody.innerHTML = '';
            
            for (let nama in dataPerAnggota) {
                const kontribusi = dataPerAnggota[nama];
                const persenKontribusi = (kontribusi / totalLabaSistem) * 100;
                const nilaiSHU = (kontribusi / totalLabaSistem) * labaYangDibagi;

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${nama}</strong></td>
                        <td class="txt-right">${formatR(kontribusi)}</td>
                        <td class="txt-right">${persenKontribusi.toFixed(2)}%</td>
                        <td class="txt-right"><b style="color:var(--dark)">${formatR(nilaiSHU)}</b></td>
                    </tr>
                `;
            }
            document.getElementById('hasilSHU').style.display = 'block';
        });

        muatData();
    </script>
</body>
</html>
