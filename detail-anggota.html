<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
        authDomain: "koperasi-pengayoman.firebaseapp.com",
        projectId: "koperasi-pengayoman",
        storageBucket: "koperasi-pengayoman.firebasestorage.app",
        messagingSenderId: "302370488338",
        appId: "1:302370488338:web:52cecadea899bcaba998cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Ambil ID dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const idAnggota = urlParams.get('id');

    const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    async function muatData() {
        if (!idAnggota) {
            alert("ID Anggota tidak terdeteksi di URL!");
            return;
        }

        try {
            // 1. Ambil Profil Anggota
            const docRef = doc(db, "anggota", idAnggota);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                document.getElementById('namaAnggota').innerText = "Riwayat: " + docSnap.data().nama;
            }

            // 2. Ambil SIMPANAN
            let totalSimpanan = 0;
            const qSimpanan = query(collection(db, "simpanan"), where("id_anggota", "==", idAnggota));
            const snapSimpanan = await getDocs(qSimpanan);
            const tbodyS = document.getElementById('listSimpanan');
            tbodyS.innerHTML = '';
            
            snapSimpanan.forEach(d => {
                const dataS = d.data();
                const nilaiS = Number(dataS.jumlah) || 0;
                totalSimpanan += nilaiS;
                // Gunakan field sesuai database: tanggal_transaksi (atau tanggal)
                tbodyS.innerHTML += `<tr><td>${dataS.tanggal_transaksi || dataS.tanggal}</td><td>${dataS.jenis_simpanan || 'Setoran'}</td><td>${formatRupiah(nilaiS)}</td></tr>`;
            });
            document.getElementById('totalSimpanan').innerText = formatRupiah(totalSimpanan);

            // 3. Ambil PINJAMAN & ANGSUARAN
            let sisaPinjaman = 0;
            const qPinjaman = query(collection(db, "pinjaman"), where("id_anggota", "==", idAnggota));
            const snapPinjaman = await getDocs(qPinjaman);
            const tbodyP = document.getElementById('listPinjaman');
            tbodyP.innerHTML = '';
            
            // Pakai for...of agar bisa await angsuran di dalamnya
            for (const docP of snapPinjaman.docs) {
                const dataP = docP.data();
                const idP = docP.id;
                const nilaiP = Number(dataP.jumlah) || 0;
                sisaPinjaman += nilaiP;

                tbodyP.innerHTML += `
                    <tr style="background-color: #fffaf0;">
                        <td>${dataP.tanggal}</td>
                        <td><strong>PINJAMAN:</strong> ${dataP.keterangan || '-'}</td>
                        <td>${formatRupiah(nilaiP)}</td>
                    </tr>
                `;

                // 4. Ambil Angsuran (Cek field id_pinjaman)
                const qAngsuran = query(collection(db, "angsuran"), where("id_pinjaman", "==", idP));
                const snapAngsuran = await getDocs(qAngsuran);
                
                snapAngsuran.forEach(docA => {
                    const dataA = docA.data();
                    const nilaiA = Number(dataA.jumlah) || 0;
                    sisaPinjaman -= nilaiA;
                    tbodyP.innerHTML += `
                        <tr style="font-size: 0.85rem; color: #7f8c8d;">
                            <td>${dataA.tanggal}</td>
                            <td>└ Angsuran ke-${dataA.angsuran_ke}</td>
                            <td>- ${formatRupiah(nilaiA)}</td>
                        </tr>
                    `;
                });
            }
            document.getElementById('sisaPinjaman').innerText = formatRupiah(sisaPinjaman);

        } catch (err) {
            console.error("Kesalahan:", err);
            alert("Terjadi kesalahan saat memuat data.");
        }
    }

    muatData();
</script>
