<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Anggota - Koperasi Pengayoman</title>
    <style>
        /* [Masukkan semua CSS yang sama persis seperti sebelumnya di sini, saya persingkat agar rapi] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1a252f; text-align: center; }
        .sidebar-header h2 { font-size: 1.2rem; color: #1abc9c; }
        .menu { list-style: none; padding: 20px 0; }
        .menu li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.3s; }
        .menu li a:hover, .menu li a.active { background-color: #1abc9c; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { background-color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { padding: 20px; overflow-y: auto; }
        .form-container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; }
        .form-container h3 { margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #1abc9c; padding-bottom: 10px; display: inline-block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #1abc9c; }
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background-color: #1abc9c; }
        .btn-save:hover { background-color: #16a085; }
        .btn-cancel { background-color: #95a5a6; text-decoration: none; display: inline-block; text-align: center;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html">Beranda (Dashboard)</a></li>
            <li><a href="daftar-anggota.html" class="active">Data Anggota</a></li>
            <li><a href="simpanan.html">Simpanan</a></li>
            <li><a href="pinjaman.html">Pinjaman</a></li>
            <li><a href="angsuran.html">Angsuran</a></li>
	    <a href="laporan.html">Laporan</a>
        </ul>
    </div>

    <div class="main-content">
        <div class="header"><h2>Pendaftaran Anggota Baru</h2></div>
        <div class="content">
            <div class="form-container">
                <h3>Formulir Data Anggota</h3>
                
                <form id="formAnggota">
                    <div class="form-group">
                        <label for="no_anggota">No. Anggota</label>
                        <input type="text" id="no_anggota" placeholder="Masukkan nomor anggota" required>
                    </div>
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                    </div>
                    <div class="form-group">
                        <label for="tanggal_gabung">Tanggal Bergabung</label>
                        <input type="date" id="tanggal_gabung" required>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-save">Simpan Data</button>
                        <a href="daftar-anggota.html" class="btn btn-cancel">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Mengimpor fungsi Firebase dari internet
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. GANTI BAGIAN INI dengan kode konfigurasi proyek Firebase Anda!
        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb",
	    measurementId: "G-CVWCXTF3FX"
        };

        // 3. Menghidupkan Firebase & Database Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. Logika ketika tombol simpan ditekan
        document.getElementById('formAnggota').addEventListener('submit', async function(event) {
            event.preventDefault(); // Mencegah halaman refresh (loading ulang)

            // Mengambil nilai dari kotak input
            const noAnggota = document.getElementById('no_anggota').value;
            const namaLengkap = document.getElementById('nama').value;
            const tanggalGabung = document.getElementById('tanggal_gabung').value;

            try {
                // Menyimpan ke database Firebase di "folder" bernama "anggota"
                const docRef = await addDoc(collection(db, "anggota"), {
                    no_anggota: noAnggota,
                    nama: namaLengkap,
                    tanggal_gabung: tanggalGabung,
                    waktu_input: new Date() // Menyimpan waktu saat data diinput
                });
                
                alert("Berhasil! Data Anggota tersimpan dengan ID: " + docRef.id);
                document.getElementById('formAnggota').reset(); // Mengosongkan form
            } catch (e) {
                console.error("Error menambahkan data: ", e);
                alert("Gagal menyimpan data. Cek koneksi internet Anda.");
            }
        });
    </script>
</body>
</html>
