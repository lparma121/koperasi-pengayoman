<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Koperasi Pengayoman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1abc9c; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --success: #27ae60; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--light); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--dark); color: white; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 30px 20px; background-color: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header h2 { color: var(--primary); font-size: 1.1rem; letter-spacing: 1px; }
        .menu { list-style: none; padding: 20px 0; flex: 1; }
        .menu li a { color: #bdc3c7; text-decoration: none; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; }
        .menu li a i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li a:hover, .menu li a.active { background-color: #34495e; color: white; border-left-color: var(--primary); }

        /* Content Area */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .content { padding: 30px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .stat-card i { font-size: 2.5rem; opacity: 0.2; position: absolute; right: 20px; bottom: 15px; color: var(--dark); }
        .stat-info h3 { font-size: 0.85rem; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }
        .stat-info p { font-size: 1.6rem; font-weight: bold; color: var(--dark); }

        /* Chart Section */
        .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .chart-card h3 { margin-bottom: 20px; font-size: 1.1rem; color: var(--dark); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .c-primary { border-top: 5px solid var(--primary); }
        .c-success { border-top: 5px solid var(--success); }
        .c-orange { border-top: 5px solid #e67e22; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="#" class="active"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="daftar-anggota.html"><i class="fa fa-users"></i> Data Anggota</a></li>
            <li><a href="simpanan.html"><i class="fa fa-wallet"></i> Simpanan</a></li>
            <li><a href="setor-massal.html"><i class="fa fa-layer-group"></i> Setor Massal</a></li>
            <li><a href="pinjaman.html"><i class="fa fa-hand-holding-dollar"></i> Pinjaman</a></li>
            <li><a href="angsuran.html"><i class="fa fa-money-bill-wave"></i> Angsuran</a></li>
            <li><a href="laporan.html"><i class="fa fa-file-invoice-dollar"></i> Laporan & SHU</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="welcomeMsg">Ringkasan Operasional</h2>
            <button onclick="window.location.href='cek-saldo.html'" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">Portal Anggota</button>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card c-primary">
                    <div class="stat-info">
                        <h3>Total Anggota</h3>
                        <p id="txtTotalAnggota">0</p>
                    </div>
                    <i class="fa fa-users"></i>
                </div>
                <div class="stat-card c-success">
                    <div class="stat-info">
                        <h3>Total Simpanan</h3>
                        <p id="txtTotalSimpanan">Rp 0</p>
                    </div>
                    <i class="fa fa-piggy-bank"></i>
                </div>
                <div class="stat-card c-orange">
                    <div class="stat-info">
                        <h3>Laba Bunga Jasa</h3>
                        <p id="txtTotalLaba">Rp 0</p>
                    </div>
                    <i class="fa fa-chart-line"></i>
                </div>
            </div>

            <div class="chart-grid">
                <div class="chart-card">
                    <h3>Perbandingan Arus Kas</h3>
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Porsi Keuangan</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const formatR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        async function loadDashboard() {
            const [sAng, sSim, sAns, sPin] = await Promise.all([
                getDocs(collection(db, "anggota")),
                getDocs(collection(db, "simpanan")),
                getDocs(collection(db, "angsuran")),
                getDocs(collection(db, "pinjaman"))
            ]);

            document.getElementById('txtTotalAnggota').innerText = sAng.size;

            let totalS = 0; sSim.forEach(d => totalS += Number(d.data().jumlah) || 0);
            document.getElementById('txtTotalSimpanan').innerText = formatR(totalS);

            let totalLaba = 0; sAns.forEach(d => totalLaba += Number(d.data().bunga) || 0);
            document.getElementById('txtTotalLaba').innerText = formatR(totalLaba);

            let totalP = 0; sPin.forEach(d => totalP += Number(d.data().jumlah) || 0);

            // RENDER GRAFIK
            renderCharts(totalS, totalP, totalLaba);
        }

        function renderCharts(simpanan, pinjaman, laba) {
            // 1. Grafik Batang (Arus Kas)
            new Chart(document.getElementById('mainChart'), {
                type: 'bar',
                data: {
                    labels: ['Total Simpanan', 'Total Pinjaman Keluar', 'Laba Jasa Terkumpul'],
                    datasets: [{
                        label: 'Nominal Rupiah',
                        data: [simpanan, pinjaman, laba],
                        backgroundColor: ['#1abc9c', '#e67e22', '#27ae60'],
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // 2. Grafik Pie (Komposisi)
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Modal (Simpanan)', 'Keuntungan'],
                    datasets: [{
                        data: [simpanan, laba],
                        backgroundColor: ['#3498db', '#27ae60']
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        loadDashboard();
    </script>
</body>
</html>
