<div class="content">
    <div class="card" style="margin-bottom:20px;">
        <h3>Pembagian SHU Berdasarkan Laba Bunga</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:15px;">
            <div class="form-group">
                <label>Total Laba Bunga Tersedia (Dari Dashboard)</label>
                <input type="number" id="labaTersedia" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;" placeholder="Masukkan angka laba...">
            </div>
            <div class="form-group">
                <label>Porsi yang Dibagikan (%)</label>
                <input type="number" id="porsiSHU" value="100" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;">
            </div>
        </div>
        <button id="btnHitungSHU" style="margin-top:20px; width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">SIMULASI PEMBAGIAN SHU</button>
    </div>
    <div id="hasilSHU" style="display:none;" class="card">
        <table id="tabelSHU">
            <thead>
                <tr>
                    <th>Nama Anggota</th>
                    <th>Kontribusi Bunga</th>
                    <th>Porsi (%)</th>
                    <th>SHU Diterima</th>
                </tr>
            </thead>
            <tbody id="bodySHU"></tbody>
        </table>
    </div>
</div>
