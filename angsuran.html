<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angsuran Otomatis - Koperasi Pengayoman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1abc9c; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --success: #27ae60; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--light); }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; background-color: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header h2 { color: var(--primary); font-size: 1.1rem; letter-spacing: 1px; }
        .menu { list-style: none; padding: 20px 0; flex: 1; }
        .menu li a { color: #bdc3c7; text-decoration: none; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; }
        .menu li a i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li a:hover, .menu li a.active { background-color: #34495e; color: white; border-left-color: var(--primary); }
        
        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; overflow-y: auto; }

        /* Form Card */
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 700px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; transition: 0.3s; background-color: white; }
        input[readonly] { background-color: #f8f9fa; cursor: not-allowed; color: #7f8c8d; }
        
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .info-pinjaman { background: #e8f8f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; border-left: 4px solid var(--primary); }
        .info-pinjaman p { font-size: 0.85rem; color: #16a085; margin: 2px 0; }

        .total-box { background: var(--dark); padding: 20px; border-radius: 8px; text-align: center; margin-top: 10px; color: white; }
        .total-box p { font-size: 0.8rem; color: #bdc3c7; text-transform: uppercase; margin-bottom: 5px; }
        .total-box h2 { color: var(--primary); font-size: 1.8rem; }

        .btn-submit { background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; margin-top: 20px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-submit:hover { background-color: #16a085; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="daftar-anggota.html"><i class="fa fa-users"></i> Data Anggota</a></li>
            <li><a href="simpanan.html"><i class="fa fa-wallet"></i> Simpanan</a></li>
            <li><a href="setor-massal.html"><i class="fa fa-layer-group"></i> Setor Massal</a></li>
            <li><a href="pinjaman.html"><i class="fa fa-hand-holding-dollar"></i> Pinjaman</a></li>
            <li><a href="angsuran.html" class="active"><i class="fa fa-money-bill-wave"></i> Angsuran</a></li>
            <li><a href="laporan.html"><i class="fa fa-file-invoice-dollar"></i> Laporan & SHU</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 style="color: var(--dark)">Input Angsuran Otomatis</h2>
            <span style="background: var(--primary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;">TENOR 10 BLN | JASA 1%</span>
        </div>

        <div class="content">
            <div class="form-card">
                <form id="formAngsuran">
                    <div class="form-group">
                        <label>Pilih Nama Anggota</label>
                        <select id="idPilihPinjaman" required>
                            <option value="">-- Memuat data pinjaman... --</option>
                        </select>
                    </div>

                    <div id="boxInfo" class="info-pinjaman">
                        <p id="infoPlafon">Plafon Pinjaman: Rp 0</p>
                        <p>Ketentuan: Angsuran Pokok 1/10 & Jasa 1% dari Plafon</p>
                    </div>

                    <div class="form-group">
                        <label>Tanggal Pembayaran</label>
                        <input type="date" id="tglBayar" required>
                    </div>

                    <div class="grid-input">
                        <div class="form-group">
                            <label>Angsuran Pokok (1/10)</label>
                            <input type="number" id="inputPokok" readonly required title="Dihitung otomatis dari plafon">
                        </div>
                        <div class="form-group">
                            <label>Bunga / Jasa (1%)</label>
                            <input type="number" id="inputBunga" readonly required title="Dihitung otomatis (1% dari plafon)">
                        </div>
                    </div>

                    <div class="total-box">
                        <p>Total Wajib Bayar Bulan Ini</p>
                        <h2 id="txtTotal">Rp 0</h2>
                    </div>

                    <button type="submit" class="btn-submit" id="btnSimpan">
                        <i class="fa fa-check-circle"></i> SIMPAN PEMBAYARAN
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const inPokok = document.getElementById('inputPokok');
        const inBunga = document.getElementById('inputBunga');
        const txtTotal = document.getElementById('txtTotal');
        const boxInfo = document.getElementById('boxInfo');
        const infoPlafon = document.getElementById('infoPlafon');

        document.getElementById('tglBayar').valueAsDate = new Date();

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else muatPinjamanAktif();
        });

        async function muatPinjamanAktif() {
            const dropdown = document.getElementById('idPilihPinjaman');
            try {
                const q = query(collection(db, "pinjaman"), where("status", "==", "Aktif"));
                const snap = await getDocs(q);
                dropdown.innerHTML = '<option value="">-- Pilih Anggota --</option>';
                snap.forEach(doc => {
                    const d = doc.data();
                    // Simpan jumlah plafon di atribut data-plafon
                    dropdown.innerHTML += `<option value="${doc.id}" data-nama="${d.info_anggota}" data-plafon="${d.jumlah}">${d.info_anggota}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        // LOGIKA OTOMATIS SAAT PILIH ANGGOTA
        document.getElementById('idPilihPinjaman').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            const plafon = Number(selected.dataset.plafon) || 0;

            if (plafon > 0) {
                // Hitung otomatis
                const pokokBulanan = plafon / 10;
                const bungaBulanan = plafon * 0.01;
                const total = pokokBulanan + bungaBulanan;

                // Isi input secara otomatis
                inPokok.value = pokokBulanan;
                inBunga.value = bungaBulanan;
                
                // Tampilkan info & total
                boxInfo.style.display = 'block';
                infoPlafon.innerText = "Plafon Pinjaman Asli: " + new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(plafon);
                txtTotal.innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(total);
            } else {
                boxInfo.style.display = 'none';
                inPokok.value = '';
                inBunga.value = '';
                txtTotal.innerText = 'Rp 0';
            }
        });

        document.getElementById('formAngsuran').addEventListener('submit', async (e) => {
            e.preventDefault();
            const select = document.getElementById('idPilihPinjaman');
            const idPinjam = select.value;
            const namaAnggota = select.options[select.selectedIndex].dataset.nama;

            try {
                await addDoc(collection(db, "angsuran"), {
                    id_pinjaman: idPinjam,
                    info_anggota: namaAnggota,
                    jumlah: Number(inPokok.value),
                    bunga: Number(inBunga.value),
                    tanggal: document.getElementById('tglBayar').value,
                    waktu_input: new Date().toISOString()
                });
                alert("Angsuran Berhasil Dicatat!");
                window.location.reload();
            } catch (err) { alert("Error: " + err.message); }
        });
    </script>
</body>
</html>
