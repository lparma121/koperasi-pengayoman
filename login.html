<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Koperasi Konsumen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #2c3e50; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { color: #1abc9c; margin-bottom: 5px; font-size: 1.8rem; }
        .login-box p { color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #34495e; font-size: 0.9rem;}
        .input-group input { width: 100%; padding: 14px 15px; border: 2px solid #ecf0f1; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s; background: #f9fbfb;}
        .input-group input:focus { border-color: #1abc9c; background: white; }
        
        .btn-login { width: 100%; padding: 15px; background: #1abc9c; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #16a085; transform: translateY(-2px); }
        .btn-login:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2><i class="fa fa-leaf"></i> Koperasi Admin</h2>
        <p>Silakan masuk untuk mengelola data</p>

        <form id="formLogin">
            <div class="input-group">
                <label>Email Admin</label>
                <input type="email" id="email" placeholder="admin@koperasi.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Masuk ke Dashboard <i class="fa fa-arrow-right"></i></button>
        </form>
        
        <div style="margin-top: 25px; font-size: 0.85rem; color: #95a5a6; border-top: 1px solid #eee; padding-top: 15px;">
            Anggota Koperasi? <br>
            <a href="cek-saldo.html" style="color: #1abc9c; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 5px;">Buka Portal Cek Saldo</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // HANYA proses perpindahan halaman JIKA tombol Masuk ditekan
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Autentikasi dengan Firebase
                await signInWithEmailAndPassword(auth, email, password);
                
                // Jika sukses, lempar ke dashboard secara manual
                window.location.href = "index.html"; 
                
            } catch (error) {
                btn.innerHTML = 'Masuk ke Dashboard <i class="fa fa-arrow-right"></i>';
                btn.disabled = false;
                Swal.fire({
                    icon: 'error',
                    title: 'Akses Ditolak',
                    text: 'Email atau password salah! Silakan coba lagi.'
                });
            }
        });
    </script>
</body>
</html>
