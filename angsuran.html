<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angsuran - Koperasi Pengayoman</title>
    <style>
        /* CSS Utama dengan aksen Ungu */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1a252f; text-align: center; }
        .sidebar-header h2 { font-size: 1.2rem; color: #1abc9c; }
        .menu { list-style: none; padding: 20px 0; }
        .menu li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.3s; }
        .menu li a:hover, .menu li a.active { background-color: #1abc9c; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { background-color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { padding: 20px; overflow-y: auto; }
        .form-container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; }
        .form-container h3 { margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #8e44ad; padding-bottom: 10px; display: inline-block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #8e44ad; }
        .input-group-flex { display: flex; align-items: center; }
        .input-group-flex span { background-color: #ecf0f1; padding: 12px; border: 1px solid #ccc; border-right: none; border-radius: 4px 0 0 4px; font-weight: bold; color: #7f8c8d; }
        .input-group-flex span.suffix { border-right: 1px solid #ccc; border-left: none; border-radius: 0 4px 4px 0; }
        .input-group-flex input { flex: 1; border-radius: 0 4px 4px 0; }
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background-color: #8e44ad; }
        .btn-save:hover { background-color: #732d91; }
        .btn-cancel { background-color: #95a5a6; text-decoration: none; display: inline-block; text-align: center;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html">Beranda (Dashboard)</a></li>
            <li><a href="daftar-anggota.html">Data Anggota</a></li>
            <li><a href="simpanan.html">Simpanan</a></li>
            <li><a href="pinjaman.html">Pinjaman</a></li>
            <li><a href="#" class="active" style="background-color: #8e44ad;">Angsuran</a></li>
	    <a href="laporan.html">Laporan</a>
        </ul>
    </div>

    <div class="main-content">
        <div class="header"><h2>Bayar Angsuran</h2></div>
        <div class="content">
            <div class="form-container">
                <h3>Form Setoran Angsuran</h3>
                <form id="formAngsuran">
                    <div class="form-group">
                        <label for="tanggal">Tanggal Bayar</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label for="pinjaman">Pilih Pinjaman Aktif</label>
                        <select id="pinjaman" required>
                            <option value="">-- Sedang memuat pinjaman... --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="angsuran_ke">Angsuran Ke-</label>
                        <div class="input-group-flex">
                            <input type="number" id="angsuran_ke" min="1" max="10" placeholder="1" required>
                            <span class="suffix">dari 10 Bulan</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="jumlah">Jumlah Bayar (Pokok + Bunga)</label>
                        <div class="input-group-flex">
                            <span>Rp</span>
                            <input type="number" id="jumlah" placeholder="Contoh: 550000" required>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-save">Proses Bayar</button>
                        <a href="index.html" class="btn btn-cancel">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // GANTI DENGAN KODE FIREBASE CONFIG ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb",
	    measurementId: "G-CVWCXTF3FX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Hanya memuat data dari koleksi "pinjaman" yang statusnya "Aktif"
        async function muatPinjamanAktif() {
            const dropdown = document.getElementById('pinjaman');
            try {
                const q = query(collection(db, "pinjaman"), where("status", "==", "Aktif"));
                const querySnapshot = await getDocs(q);
                
                dropdown.innerHTML = '<option value="">-- Pilih Pinjaman --</option>';
                
                if (querySnapshot.empty) {
                    dropdown.innerHTML = '<option value="">Tidak ada pinjaman aktif</option>';
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    dropdown.innerHTML += `<option value="${doc.id}">${data.info_anggota} (Rp ${data.jumlah})</option>`;
                });
            } catch (error) {
                console.error(error);
                dropdown.innerHTML = '<option value="">Gagal memuat data</option>';
            }
        }
        muatPinjamanAktif();

        document.getElementById('formAngsuran').addEventListener('submit', async function(event) {
            event.preventDefault();
            const dropdown = document.getElementById('pinjaman');
            const dataAngsuran = {
                tanggal: document.getElementById('tanggal').value,
                id_pinjaman: dropdown.value,
                info_pinjaman: dropdown.options[dropdown.selectedIndex].text,
                angsuran_ke: document.getElementById('angsuran_ke').value,
                jumlah: parseInt(document.getElementById('jumlah').value),
                waktu_input: new Date()
            };

            try {
                await addDoc(collection(db, "angsuran"), dataAngsuran);
                alert("Pembayaran angsuran berhasil dicatat!");
                document.getElementById('formAngsuran').reset();
            } catch (e) {
                alert("Gagal mencatat pembayaran.");
            }
        });
    </script>
</body>
</html>
