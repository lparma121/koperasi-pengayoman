<div class="content">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 800px; margin: auto;">
        <h3 style="margin-bottom: 20px; color: var(--dark)">Input Pembayaran Angsuran</h3>
        <form id="formAns">
            <label>Pilih Anggota (Pinjaman Aktif)</label>
            <select id="pilihPinjaman" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:6px;" required></select>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:15px;">
                <div>
                    <label>Angsuran Pokok (Rp)</label>
                    <input type="number" id="pokok" style="width:100%; padding:12px; margin-top:8px;" required>
                </div>
                <div>
                    <label>Bunga/Jasa (Rp)</label>
                    <input type="number" id="bunga" style="width:100%; padding:12px; margin-top:8px;" required>
                </div>
            </div>
            
            <div style="margin-top:20px; background:#f8f9fa; padding:15px; text-align:center; border-radius:8px;">
                <p style="font-size:0.9rem; color:#7f8c8d;">TOTAL DITERIMA KASIR:</p>
                <h2 id="displayTotal" style="color:var(--dark)">Rp 0</h2>
            </div>
            
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:6px; margin-top:20px; font-weight:bold; cursor:pointer;">SIMPAN TRANSAKSI</button>
        </form>
    </div>
</div>
