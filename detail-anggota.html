<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Anggota - Koperasi Pengayoman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f7f6; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .summary-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .summary-box { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #1abc9c; }
        .summary-box h4 { color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .summary-box p { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h3 { margin-bottom: 15px; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        table th { background: #f8f9fa; font-size: 0.9rem; color: #34495e; }
        .btn-back { background: #95a5a6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .text-red { color: #e74c3c; font-weight: bold; }
        .text-green { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding:20px; background:#1a252f; text-align:center;"><h2>KOPERASI</h2></div>
    </div>
    
    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="namaAnggota">Memuat Profil...</h2>
            <a href="daftar-anggota.html" class="btn-back">← Kembali</a>
        </div>

        <div class="summary-container">
            <div class="summary-box">
                <h4>Total Simpanan</h4>
                <p id="totalSimpanan">Rp 0</p>
            </div>
            <div class="summary-box" style="border-top-color: #e67e22;">
                <h4>Total Pinjaman (Belum Lunas)</h4>
                <p id="sisaPinjaman">Rp 0</p>
            </div>
        </div>

        <div class="card">
            <h3>Riwayat Transaksi Anggota</h3>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Keterangan / Jenis</th>
                        <th>Arah Dana</th>
                        <th>Jumlah</th>
                    </tr>
                </thead>
                <tbody id="listTransaksi">
                    <tr><td colspan="4" style="text-align:center; padding:20px;">Mencari riwayat...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const idAnggota = urlParams.get('id');

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                if (idAnggota) {
                    muatDataPenuh();
                } else {
                    document.getElementById('namaAnggota').innerText = "Error: ID Tidak Valid";
                }
            }
        });

        async function muatDataPenuh() {
            try {
                const profilSnap = await getDoc(doc(db, "anggota", idAnggota));
                if (profilSnap.exists()) {
                    document.getElementById('namaAnggota').innerText = "Riwayat: " + profilSnap.data().nama;
                }

                const tbody = document.getElementById('listTransaksi');
                let totalS = 0;
                let totalP = 0;
                let htmlKonten = "";

                // Ambil Simpanan
                const snapS = await getDocs(query(collection(db, "simpanan"), where("id_anggota", "==", idAnggota)));
                snapS.forEach(d => {
                    const data = d.data();
                    const nilai = Number(data.jumlah) || 0;
                    totalS += nilai;
                    htmlKonten += `<tr>
                        <td>${data.tanggal || data.tanggal_transaksi || '-'}</td>
                        <td>Simpanan (${data.jenis_simpanan || 'Setoran'})</td>
                        <td class="text-green">MASUK</td>
                        <td>${formatRupiah(nilai)}</td>
                    </tr>`;
                });

                // Ambil Pinjaman
                const snapP = await getDocs(query(collection(db, "pinjaman"), where("id_anggota", "==", idAnggota)));
                for (const docP of snapP.docs) {
                    const dataP = docP.data();
                    const nilaiP = Number(dataP.jumlah) || 0;
                    totalP += nilaiP;
                    htmlKonten += `<tr>
                        <td>${dataP.tanggal || '-'}</td>
                        <td>Pinjaman: ${dataP.keterangan || '-'}</td>
                        <td class="text-red">KELUAR</td>
                        <td>${formatRupiah(nilaiP)}</td>
                    </tr>`;

                    // Cek Angsuran untuk pinjaman ini
                    const snapA = await getDocs(query(collection(db, "angsuran"), where("id_pinjaman", "==", docP.id)));
                    snapA.forEach(docA => {
                        const dataA = docA.data();
                        const nilaiA = Number(dataA.jumlah) || 0;
                        totalP -= nilaiA; // Kurangi sisa pinjaman
                        htmlKonten += `<tr style="font-size: 0.85rem; color: #7f8c8d;">
                            <td>${dataA.tanggal || '-'}</td>
                            <td>└ Angsuran ke-${dataA.angsuran_ke || '-'}</td>
                            <td class="text-green">MASUK</td>
                            <td>${formatRupiah(nilaiA)}</td>
                        </tr>`;
                    });
                }

                document.getElementById('totalSimpanan').innerText = formatRupiah(totalS);
                document.getElementById('sisaPinjaman').innerText = formatRupiah(totalP);

                if (htmlKonten === "") {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Belum ada riwayat transaksi.</td></tr>';
                } else {
                    tbody.innerHTML = htmlKonten;
                }

            } catch (err) {
                console.error("Gagal memuat:", err);
                document.getElementById('listTransaksi').innerHTML = '<tr><td colspan="4" style="color:red; text-align:center;">Gagal mengambil data: Pastikan Aturan Firestore sudah di-Publish.</td></tr>';
            }
        }
    </script>
</body>
</html>
