<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Import Data Massal - Koperasi Pengayoman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; padding: 20px; }
        .import-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 20px; font-size: 0.9rem; }
        .file-input { margin: 20px 0; padding: 20px; border: 2px dashed #1abc9c; border-radius: 8px; cursor: pointer; }
        .btn-upload { background: #1abc9c; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; font-weight: bold; font-size: 0.9rem; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; background: #1abc9c; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="import-box">
        <h2>Import Anggota Massal</h2>
        <p>Gunakan file CSV dengan kolom: <b>no_anggota, nama, tanggal_gabung</b></p>
        
        <input type="file" id="csvFile" class="file-input" accept=".csv">
        <button id="btnProses" class="btn-upload">Mulai Import ke Firebase</button>

        <div class="progress-bar" id="progressCont"><div class="progress-fill" id="progressFill"></div></div>
        <div id="status"></div>
        <br>
        <a href="daftar-anggota.html" style="color: #1abc9c; text-decoration: none;">← Kembali ke Daftar Anggota</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Satpam: Hanya Admin yang boleh akses halaman ini
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
        });

        document.getElementById('btnProses').addEventListener('click', function() {
            const fileInput = document.getElementById('csvFile');
            const status = document.getElementById('status');
            const bar = document.getElementById('progressFill');
            const cont = document.getElementById('progressCont');

            if (fileInput.files.length === 0) {
                alert("Pilih file CSV dulu!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                const text = e.target.result;
                const rows = text.split("\n").slice(1); // Potong baris judul (header)
                let sukses = 0;

                cont.style.display = 'block';
                status.innerText = "Sedang memproses...";

                for (let i = 0; i < rows.length; i++) {
                    const columns = rows[i].split(",");
                    if (columns.length >= 3) {
                        try {
                            await addDoc(collection(db, "anggota"), {
                                no_anggota: columns[0].trim(),
                                nama: columns[1].trim(),
                                tanggal_gabung: columns[2].trim(),
                                waktu_input: new Date().toISOString()
                            });
                            sukses++;
                            // Update Progress Bar
                            let persen = Math.round(((i + 1) / rows.length) * 100);
                            bar.style.width = persen + "%";
                        } catch (err) {
                            console.error("Gagal baris " + i);
                        }
                    }
                }
                status.innerText = "Selesai! " + sukses + " data berhasil dimasukkan.";
                status.style.color = "green";
                alert("Berhasil mengimpor " + sukses + " anggota!");
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
