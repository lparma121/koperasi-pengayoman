<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Angsuran - Koperasi Pengayoman</title>
    <style>
        /* Menggunakan style yang sama dengan halaman sebelumnya agar seragam */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1a252f; text-align: center; }
        .menu { list-style: none; padding: 20px 0; }
        .menu li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.3s; }
        .menu li a:hover, .menu li a.active { background-color: #1abc9c; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { padding: 20px; overflow-y: auto; }
        
        .form-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        
        .btn-simpan { background-color: #1abc9c; color: white; border: none; padding: 15px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; margin-top: 10px; }
        .btn-simpan:hover { background-color: #16a085; }
        
        /* Info Saldo Real-time */
        .info-saldo { background: #e8f8f5; padding: 10px; border-radius: 4px; margin-top: 5px; color: #16a085; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI</h2></div>
        <ul class="menu">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="pinjaman.html">Pinjaman</a></li>
            <li><a href="angsuran.html" class="active">Bayar Angsuran</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header"><h2>Input Pembayaran Angsuran</h2></div>
        <div class="content">
            
            <div class="form-card">
                <form id="formAngsuran">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Pilih Pinjaman Aktif</label>
                            <select id="id_pinjaman" required>
                                <option value="">-- Memuat data pinjaman... --</option>
                            </select>
                            <div id="displaySaldo" class="info-saldo">Sisa Hutang: Rp 0</div>
                        </div>
                        <div class="form-group">
                            <label>Tanggal Bayar</label>
                            <input type="date" id="tanggal" required>
                        </div>
                        <div class="form-group">
                            <label>Angsuran Pokok (Mengurangi Hutang)</label>
                            <input type="number" id="pokok" placeholder="Contoh: 500000" required>
                        </div>
                        <div class="form-group">
                            <label>Bunga / Jasa (Pendapatan Koperasi)</label>
                            <input type="number" id="bunga" placeholder="Contoh: 50000" required>
                        </div>
                    </div>
                    
                    <div style="background: #f9f9f9; padding: 15px; border-radius: 4px; margin-top: 10px; text-align: center;">
                        <span style="font-weight: bold; color: #7f8c8d;">TOTAL DITERIMA KASIR: </span>
                        <span id="totalBayar" style="font-size: 1.2rem; font-weight: bold; color: #2c3e50;">Rp 0</span>
                    </div>

                    <button type="submit" class="btn-simpan">PROSES PEMBAYARAN</button>
                </form>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Muat Daftar Pinjaman Aktif ke Dropdown
        async function muatPinjaman() {
            const dropdown = document.getElementById('id_pinjaman');
            const q = query(collection(db, "pinjaman"), where("status", "==", "Aktif"));
            const snap = await getDocs(q);
            
            dropdown.innerHTML = '<option value="">-- Pilih Nama Anggota --</option>';
            snap.forEach(doc => {
                dropdown.innerHTML += `<option value="${doc.id}" data-nama="${doc.data().info_anggota}">${doc.data().info_anggota}</option>`;
            });
        }

        // 2. Hitung Total yang harus dibayar kasir secara otomatis
        const inputPokok = document.getElementById('pokok');
        const inputBunga = document.getElementById('bunga');
        const displayTotal = document.getElementById('totalBayar');

        function hitungTotal() {
            const total = Number(inputPokok.value) + Number(inputBunga.value);
            displayTotal.innerText = "Rp " + total.toLocaleString('id-ID');
        }

        inputPokok.addEventListener('input', hitungTotal);
        inputBunga.addEventListener('input', hitungTotal);

        // 3. Proses Simpan
        document.getElementById('formAngsuran').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const idPinjam = document.getElementById('id_pinjaman').value;
            const selectElt = document.getElementById('id_pinjaman');
            const namaAnggota = selectElt.options[selectElt.selectedIndex].dataset.nama;

            try {
                await addDoc(collection(db, "angsuran"), {
                    id_pinjaman: idPinjam,
                    info_anggota: namaAnggota,
                    jumlah: Number(inputPokok.value), // Ini yang akan dikurangi dari sisa pinjaman
                    bunga: Number(inputBunga.value),  // Ini yang dihitung sebagai laba
                    tanggal: document.getElementById('tanggal').value,
                    waktu_input: new Date().toISOString()
                });

                alert("Pembayaran berhasil dicatat!");
                window.location.reload();
            } catch (err) {
                alert("Gagal: " + err.message);
            }
        });

        muatPinjaman();
    </script>
</body>
</html>
