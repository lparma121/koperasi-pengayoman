<!DOCTYPE html>
<html lang="id">
<head>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb",
            measurementId: "G-CVWCXTF3FX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; }
        });
    </script>
    <meta charset="UTF-8">
    <title>Detail Anggota - Koperasi Pengayoman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f7f6; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        
        .summary-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .summary-box { 
            flex: 1; background: white; padding: 20px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #1abc9c;
        }
        .summary-box h4 { color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .summary-box p { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }

        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        h3 { color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th, table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        table th { background: #f8f9fa; color: #34495e; font-size: 0.9rem; }
        
        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: #95a5a6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .row-angsuran { font-size: 0.85rem; color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding:20px; background:#1a252f; text-align:center;"><h2>KOPERASI</h2></div>
    </div>
    
    <div class="main-content">
        <div class="header-info">
            <h2 id="namaAnggota">Memuat Nama...</h2>
            <a href="daftar-anggota.html" class="btn-back">← Kembali</a>
        </div>

        <div class="summary-container">
            <div class="summary-box">
                <h4>Total Simpanan</h4>
                <p id="totalSimpanan">Rp 0</p>
            </div>
            <div class="summary-box" style="border-top-color: #e67e22;">
                <h4>Sisa Pinjaman</h4>
                <p id="sisaPinjaman">Rp 0</p>
            </div>
        </div>

        <div class="card">
            <h3>Riwayat Simpanan</h3>
            <table>
                <thead><tr><th>Tanggal</th><th>Jenis Simpanan</th><th>Jumlah</th></tr></thead>
                <tbody id="listSimpanan"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>Riwayat Pinjaman & Angsuran</h3>
            <table>
                <thead><tr><th>Tanggal</th><th>Keterangan</th><th>Mutasi Saldo</th></tr></thead>
                <tbody id="listPinjaman"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const idAnggota = urlParams.get('id');

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        async function muatData() {
            if (!idAnggota) return;

            try {
                // 1. Ambil Profil Anggota
                const docSnap = await getDoc(doc(db, "anggota", idAnggota));
                if (docSnap.exists()) {
                    document.getElementById('namaAnggota').innerText = "Riwayat: " + docSnap.data().nama;
                }

                // 2. Ambil Simpanan & Hitung Total
                let totalS = 0;
                const snapSimpanan = await getDocs(query(collection(db, "simpanan"), where("id_anggota", "==", idAnggota)));
                const tbodyS = document.getElementById('listSimpanan');
                tbodyS.innerHTML = '';
                
                snapSimpanan.forEach(d => {
                    const data = d.data();
                    // PAKSA JADI ANGKA dengan Number()
                    const nilai = Number(data.jumlah) || 0;
                    totalS += nilai;
                    tbodyS.innerHTML += `<tr><td>${data.tanggal_transaksi}</td><td>${data.jenis_simpanan}</td><td>${formatRupiah(nilai)}</td></tr>`;
                });
                document.getElementById('totalSimpanan').innerText = formatRupiah(totalS);

                // 3. Ambil Pinjaman & Angsuran (LOGIKA SISA PINJAMAN)
                let totalHutang = 0;
                const tbodyP = document.getElementById('listPinjaman');
                tbodyP.innerHTML = '';

                // Ambil Data Pinjaman
                const snapPinjaman = await getDocs(query(collection(db, "pinjaman"), where("id_anggota", "==", idAnggota)));
                
                for (const docPinjam of snapPinjaman.docs) {
                    const dataP = docPinjam.data();
                    const nilaiP = Number(dataP.jumlah) || 0;
                    totalHutang += nilaiP;

                    tbodyP.innerHTML += `
                        <tr style="background-color: #fffaf0;">
                            <td>${dataP.tanggal}</td>
                            <td><strong>PINJAMAN:</strong> ${dataP.keterangan || '-'}</td>
                            <td>${formatRupiah(nilaiP)}</td>
                        </tr>
                    `;

                    // Ambil Angsuran yang terkait dengan ID Pinjaman ini
                    const qAngsuran = query(collection(db, "angsuran"), where("id_pinjaman", "==", docPinjam.id));
                    const snapAngsuran = await getDocs(qAngsuran);

                    snapAngsuran.forEach(docA => {
                        const dataA = docA.data();
                        const nilaiA = Number(dataA.jumlah) || 0;
                        totalHutang -= nilaiA; // Mengurangi total hutang

                        tbodyP.innerHTML += `
                            <tr class="row-angsuran">
                                <td>${dataA.tanggal}</td>
                                <td>└ Bayar Angsuran ke-${dataA.angsuran_ke}</td>
                                <td>- ${formatRupiah(nilaiA)}</td>
                            </tr>
                        `;
                    });
                }
                
                document.getElementById('sisaPinjaman').innerText = formatRupiah(totalHutang);

            } catch (err) {
                console.error("Detail Error:", err);
                alert("Gagal memuat detail data.");
            }
        }

        muatData();
    </script>
</body>
</html>
