<div class="content">
    <div class="form-card" style="background:white; padding:30px; border-radius:12px; max-width:600px; margin:auto; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
        <h3 style="margin-bottom:20px;">Input Simpanan Manual</h3>
        <form id="formSimpanan">
            <div class="form-group">
                <label>Pilih Anggota</label>
                <select id="selectAnggota" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;" required></select>
            </div>
            <div class="form-group">
                <label>Jenis Simpanan</label>
                <select id="jenisSimpanan" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;" required>
                    <option value="Simpanan Sukarela">Simpanan Sukarela</option>
                    <option value="Simpanan Pokok">Simpanan Pokok (Anggota Baru)</option>
                    <option value="Penarikan">Penarikan Saldo (-)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah (Rp)</label>
                <input type="number" id="jumlah" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;" required>
            </div>
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">SIMPAN TRANSAKSI</button>
        </form>
    </div>
</div>
