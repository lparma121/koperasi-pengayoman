<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angsuran - Koperasi Pengayoman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1abc9c; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --success: #27ae60; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--light); }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; background-color: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header h2 { color: var(--primary); font-size: 1.1rem; letter-spacing: 1px; }
        .menu { list-style: none; padding: 20px 0; flex: 1; }
        .menu li a { color: #bdc3c7; text-decoration: none; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; }
        .menu li a i { margin-right: 15px; width: 20px; text-align: center; }
        .menu li a:hover, .menu li a.active { background-color: #34495e; color: white; border-left-color: var(--primary); }
        
        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; overflow-y: auto; }

        /* Form Card */
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 700px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.1); }
        
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .total-box { background: #f8f9fa; padding: 20px; border-radius: 8px; text-align: center; margin-top: 10px; border: 1px dashed #ddd; }
        .total-box p { font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }
        .total-box h2 { color: var(--dark); font-size: 1.8rem; }

        .btn-submit { background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background-color: #16a085; transform: translateY(-2px); }
        
        .loading-overlay { display: none; text-align: center; color: var(--primary); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>KOPERASI PENGAYOMAN</h2></div>
        <ul class="menu">
            <li><a href="index.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="daftar-anggota.html"><i class="fa fa-users"></i> Data Anggota</a></li>
            <li><a href="simpanan.html"><i class="fa fa-wallet"></i> Simpanan</a></li>
            <li><a href="setor-massal.html"><i class="fa fa-layer-group"></i> Setor Massal</a></li>
            <li><a href="pinjaman.html"><i class="fa fa-hand-holding-dollar"></i> Pinjaman</a></li>
            <li><a href="angsuran.html" class="active"><i class="fa fa-money-bill-wave"></i> Angsuran</a></li>
            <li><a href="laporan.html"><i class="fa fa-file-invoice-dollar"></i> Laporan & SHU</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 style="color: var(--dark)">Input Pembayaran Angsuran</h2>
            <i class="fa fa-calculator" style="color: var(--primary); font-size: 1.5rem;"></i>
        </div>

        <div class="content">
            <div class="form-card">
                <form id="formAngsuran">
                    <div class="form-group">
                        <label>Cari Anggota (Pinjaman Aktif)</label>
                        <select id="idPilihPinjaman" required>
                            <option value="">-- Memuat data pinjaman... --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tanggal Pembayaran</label>
                        <input type="date" id="tglBayar" required>
                    </div>

                    <div class="grid-input">
                        <div class="form-group">
                            <label>Angsuran Pokok (Rp)</label>
                            <input type="number" id="inputPokok" placeholder="Contoh: 500000" required>
                        </div>
                        <div class="form-group">
                            <label>Bunga / Jasa (Rp)</label>
                            <input type="number" id="inputBunga" placeholder="Contoh: 50000" required>
                        </div>
                    </div>

                    <div class="total-box">
                        <p>Total Uang Diterima</p>
                        <h2 id="txtTotal">Rp 0</h2>
                    </div>

                    <button type="submit" class="btn-submit" id="btnSimpan">
                        <i class="fa fa-save"></i> SIMPAN TRANSAKSI
                    </button>
                    <div id="loading" class="loading-overlay">Memproses Transaksi...</div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
            authDomain: "koperasi-pengayoman.firebaseapp.com",
            projectId: "koperasi-pengayoman",
            storageBucket: "koperasi-pengayoman.firebasestorage.app",
            messagingSenderId: "302370488338",
            appId: "1:302370488338:web:52cecadea899bcaba998cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Set Tanggal Hari Ini secara otomatis
        document.getElementById('tglBayar').valueAsDate = new Date();

        // 1. Cek Login
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else muatPinjamanAktif();
        });

        // 2. Muat Data Pinjaman Aktif ke Dropdown
        async function muatPinjamanAktif() {
            const dropdown = document.getElementById('idPilihPinjaman');
            try {
                const q = query(collection(db, "pinjaman"), where("status", "==", "Aktif"));
                const snap = await getDocs(q);
                
                dropdown.innerHTML = '<option value="">-- Pilih Anggota --</option>';
                snap.forEach(doc => {
                    const d = doc.data();
                    dropdown.innerHTML += `<option value="${doc.id}" data-nama="${d.info_anggota}">${d.info_anggota}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        // 3. Hitung Total Otomatis
        const inPokok = document.getElementById('inputPokok');
        const inBunga = document.getElementById('inputBunga');
        const txtTotal = document.getElementById('txtTotal');

        function updateTotal() {
            const total = (Number(inPokok.value) || 0) + (Number(inBunga.value) || 0);
            txtTotal.innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(total);
        }

        inPokok.addEventListener('input', updateTotal);
        inBunga.addEventListener('input', updateTotal);

        // 4. Simpan Transaksi
        document.getElementById('formAngsuran').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSimpan');
            const loader = document.getElementById('loading');
            const select = document.getElementById('idPilihPinjaman');
            const idPinjam = select.value;
            const namaAnggota = select.options[select.selectedIndex].dataset.nama;

            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                await addDoc(collection(db, "angsuran"), {
                    id_pinjaman: idPinjam,
                    info_anggota: namaAnggota,
                    jumlah: Number(inPokok.value), // Masuk sebagai pengurang hutang (Pokok)
                    bunga: Number(inBunga.value),   // Masuk sebagai Pendapatan/Laba (Bunga)
                    tanggal: document.getElementById('tglBayar').value,
                    waktu_input: new Date().toISOString()
                });

                alert("Transaksi Angsuran Berhasil Disimpan!");
                window.location.reload();
            } catch (err) {
                alert("Gagal menyimpan: " + err.message);
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
