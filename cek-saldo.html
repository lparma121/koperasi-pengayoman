<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperasi Pengayoman - Panel Anggota</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f1f5f9;
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 25px;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.5rem; margin: 5px 0; color: var(--primary); }
        .header p { color: var(--secondary); font-size: 0.9rem; }

        #loaderData { text-align: center; padding: 20px; color: var(--primary); }

        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn:active { transform: scale(0.98); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--light); padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .stat-card .label { font-size: 0.75rem; color: var(--secondary); margin-bottom: 5px; }
        .stat-card .value { font-weight: 700; font-size: 1rem; color: var(--dark); }

        .table-container { margin-top: 20px; }
        .table-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .text-right { text-align: right; }
        .text-masuk { color: var(--success); font-weight: 600; }
        .text-keluar { color: var(--danger); font-weight: 600; }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .b-simpanan { background: #dcfce7; color: #166534; }
        .b-pinjaman { background: #fee2e2; color: #991b1b; }
        .b-angsuran { background: #e0e7ff; color: #3730a3; }

        #areaHasil, #areaUbahPin, #pesanError { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-university fa-3x" style="color:var(--primary)"></i>
        <h1>Koperasi Pengayoman</h1>
        <p>Sistem Informasi Saldo Anggota</p>
    </div>

    <div id="loaderData">
        <i class="fas fa-spinner fa-spin"></i> Memvalidasi data...
    </div>

    <div id="boxLogin">
        <form id="formCekSaldo">
            <div class="form-group">
                <label>Nama Anggota</label>
                <input type="text" id="inputNama" list="namaSaran" placeholder="Ketik nama Anda..." required>
                <datalist id="namaSaran"></datalist>
            </div>
            <div class="form-group">
                <label>PIN Keamanan</label>
                <input type="password" id="inputPin" placeholder="Default: 123456" required>
                <i class="fas fa-eye" onclick="togglePasswordVisibility('inputPin', this)" style="position:absolute; right:15px; top:42px; color:var(--secondary); cursor:pointer;"></i>
            </div>
            <button type="submit" class="btn btn-primary">Lihat Saldo Saya</button>
            <p id="pesanError" style="color:var(--danger); font-size:0.8rem; text-align:center; margin-top:10px;">Nama atau PIN salah.</p>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        
        <div class="table-title">Riwayat Arus Kas Terbaru</div>
        <table>
            <tbody id="bodyRiwayatGlobal"></tbody>
        </table>
    </div>

    <div id="areaHasil">
        <div id="namaAnggotaTampil" style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px;"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Simpanan</div>
                <div id="simpananTampil" class="value text-masuk">Rp 0</div>
            </div>
            <div class="stat-card">
                <div class="label">Sisa Pinjaman</div>
                <div id="pinjamanTampil" class="value text-keluar">Rp 0</div>
            </div>
        </div>

        <div class="table-title">
            Riwayat Anda
            <button onclick="toggleUbahPin()" style="background:none; border:none; color:var(--primary); font-size:0.8rem; cursor:pointer;"><i class="fas fa-key"></i> Ubah PIN</button>
        </div>

        <div id="areaUbahPin" style="background:#f8fafc; padding:15px; border-radius:12px; margin-bottom:15px;">
            <form id="formUbahPin">
                <input type="password" id="pinBaru" placeholder="PIN Baru" style="margin-bottom:10px;" required>
                <input type="password" id="pinKonfirm" placeholder="Konfirmasi PIN" style="margin-bottom:10px;" required>
                <button type="submit" class="btn btn-primary" style="padding:8px;">Simpan PIN</button>
            </form>
        </div>

        <table>
            <tbody id="bodyRiwayatPribadi"></tbody>
        </table>

        <button onclick="location.reload()" class="btn" style="margin-top:20px; background:#f1f5f9; color:var(--secondary);">Keluar / Kembali</button>
    </div>

    <div style="margin-top:25px; text-align:center; font-size:0.7rem; color:var(--text-muted);">
        &copy; 2026 Koperasi Pengayoman.
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjyDuWxlD2OO2Lsqc1O0PJo1jEhgxGEkI",
        authDomain: "koperasi-pengayoman.firebaseapp.com",
        projectId: "koperasi-pengayoman",
        storageBucket: "koperasi-pengayoman.firebasestorage.app",
        messagingSenderId: "302370488338",
        appId: "1:302370488338:web:52cecadea899bcaba998cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    // Fungsi Pengubah Teks ke Tanggal (Agar urut sesuai isi data)
    const parseDate = (dateStr) => {
        if (!dateStr || dateStr === "-") return new Date(0);
        const bulanIndo = {
            "Januari": 0, "Februari": 1, "Maret": 2, "April": 3, "Mei": 4, "Juni": 5,
            "Juli": 6, "Agustus": 7, "September": 8, "Oktober": 9, "November": 10, "Desember": 11
        };
        const parts = dateStr.split(' ');
        if (parts.length === 3) {
            return new Date(parseInt(parts[2]), bulanIndo[parts[1]], parseInt(parts[0]));
        }
        return new Date(dateStr);
    };

    let cacheData = { anggota: [], simpanan: [], pinjaman: [], angsuran: [], waserda: [] };
    let semuaTransaksiGlobal = [];
    let currentUser = null;

    window.togglePasswordVisibility = function(inputId, iconElement) {
        const inputField = document.getElementById(inputId);
        if (inputField.type === "password") {
            inputField.type = "text";
            iconElement.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            inputField.type = "password";
            iconElement.classList.replace("fa-eye-slash", "fa-eye");
        }
    };

    async function muatDataAwal() {
        try {
            const [snapA, snapS, snapP, snapAns, snapWas] = await Promise.all([
                getDocs(collection(db, "anggota")), getDocs(collection(db, "simpanan")),
                getDocs(collection(db, "pinjaman")), getDocs(collection(db, "angsuran")), getDocs(collection(db, "waserda"))
            ]);

            snapA.forEach(d => cacheData.anggota.push({id: d.id, ...d.data()}));
            
            snapS.forEach(d => {
                const data = d.data(); cacheData.simpanan.push(data);
                const val = Number(data.jumlah) || 0;
                let nama = data.info_anggota || ""; if(nama.includes(" - ")) nama = nama.split(" - ")[1];
                semuaTransaksiGlobal.push({ tanggal: data.tanggal_transaksi || "-", ket: `Simpanan: ${nama}`, nominal: Math.abs(val), isMasuk: val >= 0 });
            });

            snapP.forEach(d => {
                const data = d.data(); cacheData.pinjaman.push({id: d.id, ...data});
                const val = Number(data.jumlah) || 0;
                let nama = data.info_anggota || ""; if(nama.includes(" - ")) nama = nama.split(" - ")[1];
                semuaTransaksiGlobal.push({ tanggal: data.tanggal || "-", ket: `Pinjaman: ${nama}`, nominal: val, isMasuk: false });
            });

            snapAns.forEach(d => {
                const data = d.data(); cacheData.angsuran.push(data);
                const pk = Number(data.jumlah) || 0, bg = Number(data.bunga) || 0;
                let nama = data.info_anggota || ""; if(nama.includes(" - ")) nama = nama.split(" - ")[1];
                semuaTransaksiGlobal.push({ tanggal: data.tanggal || "-", ket: `Angsuran: ${nama}`, nominal: pk+bg, isMasuk: true });
            });

            snapWas.forEach(d => {
                const data = d.data(); cacheData.waserda.push(data);
                const nom = Number(data.nominal) || 0, isMasuk = data.jenis === "Pemasukan";
                semuaTransaksiGlobal.push({ tanggal: data.tanggal || "-", ket: `Waserda: ${data.keterangan}`, nominal: nom, isMasuk: isMasuk });
            });

            // URUTKAN GLOBAL SESUAI ISI TANGGAL
            semuaTransaksiGlobal.sort((a, b) => parseDate(b.tanggal) - parseDate(a.tanggal));

            const tbodyGlobal = document.getElementById('bodyRiwayatGlobal');
            tbodyGlobal.innerHTML = semuaTransaksiGlobal.slice(0, 10).map(t => `
                <tr>
                    <td style="color:var(--text-muted); font-size:0.8rem; width:100px;">${t.tanggal}</td>
                    <td><div style="font-weight:600;">${t.ket}</div></td>
                    <td class="text-right ${t.isMasuk ? 'text-masuk' : 'text-keluar'}">${t.isMasuk ? '+' : '-'} ${formatRupiah(t.nominal)}</td>
                </tr>
            `).join('');

            const datalist = document.getElementById('namaSaran');
            cacheData.anggota.forEach(a => { if(a.status!=="Keluar"){ const opt = document.createElement('option'); opt.value = a.nama; datalist.appendChild(opt); }});

            document.getElementById('loaderData').style.display = 'none';
        } catch (e) { console.error(e); }
    }
    muatDataAwal();

    document.getElementById('formCekSaldo').addEventListener('submit', (e) => {
        e.preventDefault();
        const inputNama = document.getElementById('inputNama').value.trim().toLowerCase();
        const inputPin = document.getElementById('inputPin').value;
        let found = cacheData.anggota.find(d => d.nama.toLowerCase() === inputNama);
        if (!found || inputPin !== (found.pin || "123456")) {
            document.getElementById('pesanError').style.display = 'block';
            return;
        }
        currentUser = found;
        document.getElementById('boxLogin').style.display = 'none'; 
        
        let riwayatPribadi = [];
        let pSimpanan = 0, pPlafon = 0, pAngsuranMasuk = 0, idPinjaman = [];

        cacheData.simpanan.filter(d => d.id_anggota === currentUser.id).forEach(d => {
            const v = Number(d.jumlah) || 0; pSimpanan += v;
            riwayatPribadi.push({ tanggal: d.tanggal_transaksi||"-", kategori: 'Simpanan', badge: 'b-simpanan', nominal: Math.abs(v), isMasuk: v >= 0 });
        });
        cacheData.pinjaman.filter(d => d.id_anggota === currentUser.id).forEach(d => {
            const v = Number(d.jumlah) || 0; pPlafon += v; idPinjaman.push(d.id);
            riwayatPribadi.push({ tanggal: d.tanggal||"-", kategori: 'Pinjaman', badge: 'b-pinjaman', nominal: v, isMasuk: false });
        });
        cacheData.angsuran.filter(d => idPinjaman.includes(d.id_pinjaman)).forEach(d => {
            const pk = Number(d.jumlah) || 0, bg = Number(d.bunga) || 0; pAngsuranMasuk += pk;
            riwayatPribadi.push({ tanggal: d.tanggal||"-", kategori: 'Angsuran', badge: 'b-angsuran', nominal: pk+bg, isMasuk: true });
        });

        // URUTKAN PRIBADI SESUAI ISI TANGGAL
        riwayatPribadi.sort((a, b) => parseDate(b.tanggal) - parseDate(a.tanggal));

        document.getElementById('namaAnggotaTampil').innerHTML = `Halo, <span>${currentUser.nama.split(' ')[0]}!</span>`;
        document.getElementById('simpananTampil').innerText = formatRupiah(pSimpanan);
        document.getElementById('pinjamanTampil').innerText = formatRupiah(Math.max(0, pPlafon - pAngsuranMasuk));

        const tbodyPribadi = document.getElementById('bodyRiwayatPribadi');
        tbodyPribadi.innerHTML = riwayatPribadi.slice(0, 15).map(t => `
            <tr>
                <td style="color:var(--text-muted); font-size:0.8rem;">${t.tanggal}</td>
                <td><span class="badge ${t.badge}">${t.kategori}</span></td>
                <td class="text-right ${t.isMasuk ? 'text-masuk' : 'text-keluar'}">${t.isMasuk ? '+' : '-'} ${formatRupiah(t.nominal)}</td>
            </tr>
        `).join('');
        document.getElementById('areaHasil').style.display = 'block';
    });

    window.toggleUbahPin = function() {
        const el = document.getElementById('areaUbahPin');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    document.getElementById('formUbahPin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = document.getElementById('pinBaru').value, p2 = document.getElementById('pinKonfirm').value;
        if(p1 !== p2) return alert('PIN tidak cocok!');
        await updateDoc(doc(db, "anggota", currentUser.id), { pin: p1 });
        alert('PIN berhasil diubah!');
        toggleUbahPin();
    });
</script>
</body>
</html>
